<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videoflix</title>

    <link rel="stylesheet" href="/shared/css/variables.css">
    <link rel="stylesheet" href="/shared/css/standard.css">
    <link rel="stylesheet" href="/shared/css/fonts.css">
    <link rel="stylesheet" href="/shared/css/assets.css">
    <link rel="stylesheet" href="/shared/css/header_footer.css">
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="./video_list.css">
    <link rel="stylesheet" href="/shared/css/toast_msg.css">
    <link rel="icon" href="/assets/icons/logo_icon_small.svg" type="image/svg+xml">

    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.6.7/dist/hls.min.js"></script>
    <script src="/shared/js/variables.js" ></script>
    <script src="/shared/js/ui_helper.js" ></script>
    <script src="/shared/js/api.js" ></script>
    <script src="/shared/js/header.js" ></script>
    <script src="/shared/js/config.js" ></script>
    <script src="./video_list.js" defer ></script>
</head>

<body onload="initVideoList(), setHeader()"  class="dark_bg">
<header class="main_header w_full">
    <a aria-label="video page" href="/pages/video_list/index.html">
        <img src="/assets/icons/logo_icon_small.svg" alt="" srcset="">
        <img src="/assets/icons/logo_icon.svg" alt="" srcset="">
    </a>
    <div id="head_content_right" class="d_flex_cc_gm head_content_right"></div>
</header>
<main class="w_full d_flex_ss_gl font_white_color">
    <section class="preview_section">
        <div class="preview_section_video">
            <video autoplay muted loop id="videoPlayer"></video>
            <div class="preview_section_video_overlay"></div>
        </div>
        <article>
            <h1 id="videoTitle">Oops... there are no videos !</h1>
            <p id="videoDescription"></p>
            <button id="playButton" class="std_btn btn_prime pad_s d_flex_cc_gs" onclick="playVideo()">
                <img src="../../assets/icons/play_arrow.svg" alt="" srcset="">
                Play
            </button>
        </article>
    </section>
    <section class="list_section">
        <section class="video_list">
            <h2 id="category-new">New on Videoflix</h2>
            <div class="scroll-wrapper">
                <ul id="newest">
                    <li style="font-style: italic"></li>
                </ul>
            </div>
        </section>
        </section>
    </section>
    <div id="overlay" class="video-overlay">
        <div class="overlay-content">
            <div class="overlay-header">
                <img src="/assets/icons/arrow_back.svg"  onclick="closeVideoOverlay()" alt="">
                <h1 id="overlayTitle">Video Titel</h1>
                <img src="/assets/icons/logo_icon_small.svg" alt="">

            </div>
            <div class="video-wrapper">
                <video id="overlayVideo"></video>
                <!-- Custom Video Controls -->
                <div class="custom-controls">
                    <div class="progress-container" id="progressContainer">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                    <div class="controls-bottom">
                        <button class="control-btn" id="playPauseBtn" onclick="togglePlayPause()">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                                <path id="playIcon" d="M8 5v14l11-7z"/>
                                <path id="pauseIcon" d="M6 4h4v16H6V4zm8 0h4v16h-4V4z" style="display:none;"/>
                            </svg>
                        </button>
                        <div class="time-display">
                            <span id="currentTime">0:00</span> / <span id="duration">0:00</span>
                        </div>
                        <div class="spacer"></div>
                        <!-- Volume Control -->
                        <div class="volume-container">
                            <button class="control-btn" id="volumeBtn" onclick="toggleMute()">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="white" id="volumeIcon">
                                    <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                                </svg>
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="white" id="mutedIcon" style="display:none;">
                                    <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
                                </svg>
                            </button>
                            <div class="volume-slider-container">
                                <input type="range" id="volumeSlider" min="0" max="100" value="100" class="volume-slider">
                            </div>
                        </div>
                        <!-- Settings Menu -->
                        <div class="settings-container">
                            <button class="control-btn" id="settingsBtn" onclick="toggleSettingsMenu()">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                                    <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
                                </svg>
                            </button>
                            <div class="settings-menu" id="settingsMenu">
                                <div class="settings-menu-header">
                                    <span>Qualität</span>
                                </div>
                                <div class="quality-options">
                                    <button class="quality-option" data-quality="auto" onclick="changeQuality('auto')">
                                        <span>Auto</span>
                                        <span class="checkmark" style="display:none;">✓</span>
                                    </button>
                                    <button class="quality-option active" data-quality="1080p" onclick="changeQuality('1080p')">
                                        <span>1080p</span>
                                        <span class="checkmark">✓</span>
                                    </button>
                                    <button class="quality-option" data-quality="720p" onclick="changeQuality('720p')">
                                        <span>720p</span>
                                        <span class="checkmark" style="display:none;">✓</span>
                                    </button>
                                    <button class="quality-option" data-quality="480p" onclick="changeQuality('480p')">
                                        <span>480p</span>
                                        <span class="checkmark" style="display:none;">✓</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <button class="control-btn" id="fullscreenBtn" onclick="toggleFullscreen()">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                                <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<footer class="main_footer  w_full">
    <nav class="d_flex_cs_gl w_full">
        <a aria-label="privacy policy page" href="../privacy/index.html" class="link">Privacy Policy</a>
        <a aria-label="imprint page" href="../imprint/index.html" class="link">Imprint</a>
    </nav>
</footer>
</body>

</html>
